<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD Damitio Book Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #764ba2;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .header p {
            color: #666;
            font-size: 1.1em;
            font-style: italic;
        }

        .quiz-section {
            display: none;
        }

        .quiz-section.active {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .question h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .progress-bar {
            background: #eee;
            height: 8px;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .option {
            background: #f5f5f5;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option:hover {
            background: #e8f0ff;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .option input[type="radio"] {
            margin-right: 12px;
            cursor: pointer;
        }

        .option label {
            cursor: pointer;
            display: flex;
            align-items: center;
            width: 100%;
            font-size: 1.05em;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            justify-content: space-between;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.05em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-next {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            flex: 1;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-prev {
            background: #ddd;
            color: #333;
            flex: 1;
        }

        .btn-prev:hover {
            background: #ccc;
            transform: translateY(-2px);
        }

        .result-section {
            text-align: center;
        }

        .result-book {
            background: linear-gradient(135deg, #667eea15, #764ba215);
            border-left: 5px solid #764ba2;
            padding: 25px;
            border-radius: 10px;
            margin: 30px 0;
            text-align: left;
        }

        .book-title {
            font-size: 2em;
            color: #764ba2;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .book-match-percentage {
            font-size: 2.5em;
            color: #667eea;
            font-weight: bold;
            margin: 20px 0;
            text-align: center;
        }

        .book-description {
            color: #555;
            line-height: 1.6;
            font-size: 1em;
            margin-bottom: 15px;
        }

        .amazon-link {
            display: inline-block;
            background: #FF9900;
            color: white;
            padding: 12px 25px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 15px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .amazon-link:hover {
            background: #e88d00;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 153, 0, 0.4);
        }

        .btn-restart {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            margin-top: 30px;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .final-message {
            font-size: 1.2em;
            color: #333;
            margin: 30px 0;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 CD Damitio Book Quiz</h1>
            <p>Find your perfect book match!</p>
        </div>

        <div id="quizContainer">
            <!-- Quiz content will be generated here -->
        </div>
    </div>

    <script src="quiz.js"></script>
</body>
</html>
